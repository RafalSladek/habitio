name = "habitio-feedback"
main = "feedback.js"
compatibility_date = "2025-01-01"
account_id = "ec54fc24baed2216d78fece71a99d28f"

[ai]
binding = "AI"

# Optional durable daily coach budgets.
# Uncomment and replace the IDs after creating the namespace:
#
# [[kv_namespaces]]
# binding = "COACH_BUDGETS"
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# preview_id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[vars]
COACH_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"
COACH_MAX_DAILY_REQUESTS = "5"
COACH_MAX_DAILY_ESTIMATED_TOKENS = "4500"
COACH_MAX_INPUT_CHARS = "4000"
COACH_MAX_OUTPUT_TOKENS = "220"

# Deploy:  wrangler deploy
# Set token: wrangler secret put GITHUB_TOKEN
#   (paste a fine-grained PAT with Issues: Read & Write on RafalSladek/habitio)
#
# Worker URL: https://habitio-feedback.rafal-sladek.workers.dev
# Coach endpoint: POST https://habitio-feedback.rafal-sladek.workers.dev/coach
