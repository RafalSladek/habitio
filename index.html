<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="habit.io — offline-first PWA habit tracker. Build habits with science-backed formation arcs, personalised suggestions, and a daily journal. No account, no tracking."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- PWA / install meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="habit.io" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="application-name" content="habit.io" />
    <meta name="theme-color" content="#6c5ce7" />
    <title>habit.io</title>
    <link rel="canonical" href="https://habitio.rafal-sladek.com/" />
    <!-- Google Tag Manager -->

          dl = l === "dataLayer" ? "" : "&l=" + l;

    <link rel="manifest" href="manifest.json" />
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png" />
    <!-- Apple touch icon (home screen) -->
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
    <!-- Windows / Android tile -->
    <meta name="msapplication-TileImage" content="icons/icon-192.png" />
    <meta name="msapplication-TileColor" content="#6c5ce7" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript
      ><link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet"
    /></noscript>
    <link rel="preload" as="image" href="icons/hero-onboarding.webp" type="image/webp" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-PRM6PZ6N"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
        title="Google Tag Manager"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="app">
      <div class="page active" id="page-tracker">
        <div class="header">
          <div class="header-left">
            <h1 id="h-title">habit.io</h1>
            <div id="h-greeting" class="header-greeting"></div>
          </div>
          <div class="header-actions"></div>
        </div>
        <div class="week-nav">
          <button class="nav-btn" onclick="changeWeek(-1)">&lsaquo;</button
          ><span class="week-label" id="week-label"></span
          ><button class="nav-btn" id="next-week-btn" onclick="changeWeek(1)">&rsaquo;</button>
        </div>
        <div class="days-header" id="days-header"></div>
        <div class="progress-section">
          <div class="ring-container">
            <svg width="64" height="64" viewBox="0 0 64 64">
              <circle class="ring-bg" cx="32" cy="32" r="27" />
              <circle
                class="ring-fill"
                id="ring-fill"
                cx="32"
                cy="32"
                r="27"
                stroke-dasharray="169.65"
                stroke-dashoffset="169.65"
              />
            </svg>
            <div class="ring-text" id="ring-text">0%</div>
          </div>
          <div class="progress-info">
            <div class="progress-title" id="progress-title"></div>
            <div class="progress-subtitle" id="progress-subtitle"></div>
          </div>
        </div>
        <div class="habits-scroll" id="habits-list"></div>
      </div>
      <div class="page" id="page-diary">
        <div class="header"><h1 id="diary-header">Journal</h1></div>
        <div class="page-scroll" id="diary-content"></div>
      </div>
      <div class="page" id="page-stats">
        <div class="header"><h1 id="stats-header">Analysis</h1></div>
        <div class="page-scroll" id="stats-content"></div>
      </div>
      <div class="page" id="page-settings">
        <div class="header"><h1 id="settings-header">Settings</h1></div>
        <div class="page-scroll" id="settings-content"></div>
      </div>
      <nav class="bottom-nav">
        <button class="nav-tab active" onclick="switchPage('tracker')">
          <span class="nav-icon">&#9745;</span
          ><span class="nav-label" data-t="nav_today">Today</span>
        </button>
        <button class="nav-tab" onclick="switchPage('diary')">
          <span class="nav-icon">📖</span
          ><span class="nav-label" data-t="nav_journal">Journal</span>
        </button>
        <button class="nav-tab" onclick="switchPage('stats')">
          <span class="nav-icon">📊</span><span class="nav-label" data-t="nav_stats">Stats</span>
        </button>
        <button class="nav-tab" onclick="switchPage('settings')">
          <span class="nav-icon">&#9881;</span
          ><span class="nav-label" data-t="nav_settings">Settings</span>
        </button>
      </nav>
    </div>

    <!-- MOTIVATIONAL BANNER -->
    <div id="motiv-banner"></div>

    <!-- ADD HABIT MODAL -->
    <div class="modal-overlay" id="add-modal">
      <div class="modal">
        <div class="modal-handle"></div>
        <h3 id="modal-title">Add habit</h3>
        <div id="suggestions-area"></div>
        <input
          class="modal-input"
          id="habit-name-input"
          type="text"
          maxlength="40"
          autocomplete="off"
          aria-label="Habit name"
        />
        <div class="section-label" data-t="lbl_icon">Icon</div>
        <div class="emoji-picker" id="emoji-picker"></div>
        <div class="section-label" data-t="lbl_cadence">Cadence</div>
        <div class="cadence-picker">
          <div class="cadence-chips" id="cadence-chips"></div>
          <div id="cadence-detail"></div>
        </div>
        <div style="margin-top: 12px; margin-bottom: 14px">
          <div class="section-label" id="lbl-morning">Options</div>
          <button class="morning-chip" id="morning-chip" type="button" onclick="toggleModalMorning()">
            ☀️ <span id="morning-chip-lbl">Morning routine</span>
          </button>
        </div>
        <button class="modal-btn primary" id="modal-save-btn" onclick="saveHabit()"></button>
        <button
          class="modal-btn secondary"
          id="modal-cancel-btn"
          onclick="closeAddModal()"
          data-t="btn_cancel"
        >
          Cancel
        </button>
      </div>
      <button class="modal-done-bar" id="modal-done-bar" type="button" onclick="closeAddModal()">
        <span id="modal-done-label"></span>
        <span class="modal-done-arrow" data-t="start_tracking">Start tracking →</span>
      </button>
    </div>

    <!-- WELCOME MODAL -->
    <div class="modal-overlay" id="welcome-modal">
      <div class="modal welcome-modal-inner">
        <!-- Scrollable form content (hero scrolls with form) -->
        <div class="welcome-scroll">
          <div class="welcome-hero">
            <picture>
              <source srcset="icons/hero-onboarding.webp" type="image/webp" />
              <img
                src="icons/hero-onboarding.png"
                alt=""
                width="400"
                height="140"
                fetchpriority="high"
              />
            </picture>
          </div>
          <div style="font-size: 36px; margin: 0 0 10px; text-align: center">🌱</div>
          <h2 id="welcome-title" style="text-align: center">Welcome to Habitio</h2>
          <p
            id="welcome-sub"
            style="
              font-size: 14px;
              color: var(--text-dim);
              margin-bottom: 20px;
              line-height: 1.5;
              text-align: center;
            "
          ></p>
          <div class="welcome-field">
            <label id="wl-name-label" for="welcome-name">Your first name</label
            ><input
              class="modal-input"
              id="welcome-name"
              type="text"
              maxlength="20"
              autocomplete="given-name"
              oninput="validateWelcomeForm()"
            />
          </div>
          <fieldset class="welcome-field">
            <legend id="wl-age-label" class="welcome-field-legend">Your age</legend>
            <div class="age-chips" id="welcome-age-chips"></div>
          </fieldset>
          <fieldset class="welcome-field">
            <legend id="wl-sex-label" class="welcome-field-legend">Sex</legend>
            <div class="sex-toggle" id="welcome-sex">
              <button class="sex-btn active" id="sex-male" onclick="setSex('male')" type="button">
                👨 <span id="sex-male-lbl">Male</span>
              </button>
              <button class="sex-btn" id="sex-female" onclick="setSex('female')" type="button">
                👩 <span id="sex-female-lbl">Female</span>
              </button>
              <button class="sex-btn" id="sex-prefer" onclick="setSex('prefer')" type="button">
                🔒 <span id="sex-prefer-lbl">Prefer not to say</span>
              </button>
            </div>
          </fieldset>
          <fieldset class="welcome-field">
            <legend id="wl-lang-label" class="welcome-field-legend">Language</legend>
            <div class="lang-chips" id="welcome-lang-chips"></div>
          </fieldset>
        </div>
        <!-- CTA pinned at bottom -->
        <div class="welcome-cta">
          <button class="modal-btn primary" onclick="finishWelcome()" id="welcome-go-btn">
            Let's go!
          </button>
        </div>
      </div>
    </div>

    <!-- IMPORT MODAL -->
    <div class="modal-overlay" id="import-modal">
      <div class="modal">
        <div class="modal-handle"></div>
        <h3 id="import-title">Import Data</h3>
        <p
          style="font-size: 13px; color: var(--text-dim); margin-bottom: 16px"
          id="import-desc"
        ></p>
        <div id="import-options"></div>
        <button class="modal-btn primary" onclick="doImport()" id="import-go-btn"></button>
        <button class="modal-btn secondary" onclick="closeImportModal()" data-t="btn_cancel">
          Cancel
        </button>
      </div>
    </div>

    <button class="fab" id="fab-add" onclick="openAddModal()" aria-label="Add habit">+</button>

    <div class="toast" id="toast"></div>
    <div id="tt" role="tooltip"></div>

    <script src="suggestions.js"></script>
    <script src="i18n.js"></script>
    <script src="app.js"></script>
  </body>
</html>
