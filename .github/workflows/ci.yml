name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run Playwright tests
        run: yarn test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 30

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test artifacts (videos, traces)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

  sonar:
    name: SonarCloud Analysis
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: coverage

      - name: Compute deploy version
        id: version
        run: |
          git fetch --tags --quiet
          DEPLOY_NUM=$(git tag --list 'deploy-*' | sed 's/deploy-//' | sort -n | tail -1)
          NEXT=$(printf "%03d" $(( 10#${DEPLOY_NUM:-0} + 1 )))
          echo "tag=deploy-${NEXT}" >> "$GITHUB_OUTPUT"

      - name: SonarCloud Scan
        id: sonar_scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        continue-on-error: true
        with:
          args: -Dsonar.projectVersion=${{ steps.version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarCloud Quality Gate check
        if: steps.sonar_scan.outcome == 'success'
        uses: SonarSource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496 # v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  deploy:
    name: Deploy to GitHub Pages
    needs: [test, sonar]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate badge endpoints
        run: node scripts/generate-badges.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Tag deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags --quiet
          DEPLOY_NUM=$(git tag --list 'deploy-*' | sed 's/deploy-//' | sort -n | tail -1)
          NEXT=$(printf "%03d" $(( 10#${DEPLOY_NUM:-0} + 1 )))
          TAG="deploy-${NEXT}"
          PREV_TAG=$(git tag --list 'deploy-*' | sort -V | tail -1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${{ github.sha }}"
          git push origin "${TAG}"
          if [ -n "${PREV_TAG}" ]; then
            CHANGELOG=$(git log "${PREV_TAG}".."${{ github.sha }}" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log "${{ github.sha }}" --pretty=format:"- %s (%h)" --no-merges)
          fi
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "${CHANGELOG}"

  pagespeed:
    name: PageSpeed Insights
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          urls: https://rafalsladek.github.io/habitio/
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
          budgetPath: .github/lighthouse-budget.json
